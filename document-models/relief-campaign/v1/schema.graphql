scalar OID
scalar Amount_Fiat
scalar Amount_Currency
scalar Amount_Crypto
scalar Amount
scalar Upload

type ReliefCampaignState {
    name: String!
    slug: String!
    summary: String
    incidentDate: DateTime
    status: CampaignStatus!
    targetAmount: Amount_Tokens
    affectedAsset: AffectedAsset
    contributionAddresses: [ContributionAddress!]!
    riskDisclaimer: String
    externalLinks: [ExternalLink!]!
    contributorRegistryDriveId: PHID
    operatorWallets: [EthereumAddress!]!
}

enum CampaignStatus {
    DRAFT
    ACTIVE
    EXECUTING
    RESOLVED
    FAILED
    ARCHIVED
}

type AffectedAsset {
    symbol: String!
    address: EthereumAddress
    chainId: Int!
}

type ContributionAddress {
    id: OID!
    chainId: Int!
    address: EthereumAddress!
    label: String
}

type ExternalLink {
    id: OID!
    label: String!
    url: URL!
}

# management

input AffectedAssetInput {
    symbol: String!
    address: EthereumAddress
    chainId: Int!
}

input SetCampaignDetailsInput {
    name: String
    slug: String
    summary: String
    incidentDate: DateTime
    targetAmount: Amount_Tokens
    affectedAsset: AffectedAssetInput
    riskDisclaimer: String
    contributorRegistryDriveId: PHID
}

input AddContributionAddressInput {
    id: OID!
    chainId: Int!
    address: EthereumAddress!
    label: String
}

input RemoveContributionAddressInput {
    id: OID!
}

input StartCampaignInput {
    _: Boolean
}

input MarkResolvedInput {
    _: Boolean
}

input MarkFailedInput {
    reason: String
}

input ArchiveCampaignInput {
    _: Boolean
}

input AddExternalLinkInput {
    id: OID!
    label: String!
    url: URL!
}

input AddOperatorWalletInput {
    address: EthereumAddress!
}

input RemoveOperatorWalletInput {
    address: EthereumAddress!
}