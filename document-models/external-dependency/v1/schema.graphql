type ExternalDependencyState {
    title: String!
    description: String
    kind: DependencyKind!
    blocks: [PHID!]!
    status: DependencyStatus!
    externalRef: DependencyRef
    expectedResolution: DateTime
    assignee: String
}

enum DependencyKind {
    GOVERNANCE_VOTE
    COUNCIL_ACTION
    ONCHAIN_TX
    OPERATIONAL
    OTHER
}

enum DependencyStatus {
    OPEN
    IN_PROGRESS
    RESOLVED
    BLOCKED
    ABANDONED
}

type DependencyRef {
    url: URL
    txHash: String
    proposalId: String
}

# tracking

input SetDependencyDetailsInput {
    title: String
    description: String
    kind: DependencyKind
    expectedResolution: DateTime
    assignee: String
}

input UpdateStatusInput {
    status: DependencyStatus!
}

input LinkPledgeInput {
    pledgeId: PHID!
}

input UnlinkPledgeInput {
    pledgeId: PHID!
}

input ResolveInput {
    _: Boolean
}

input AbandonInput {
    _: Boolean
}

input SetExternalRefInput {
    url: URL
    txHash: String
    proposalId: String
}