type OnchainReceiptState {
    chainId: Int
    txHash: String
    blockNumber: Int
    blockTimestamp: DateTime
    fromAddress: EthereumAddress
    toAddress: EthereumAddress
    asset: ReceiptAsset
    amount: Amount_Tokens
    ethEquivalentAmount: Amount_Tokens
    ethPriceUsdAtReceipt: Float
    matchedPledgeId: PHID
    reconciliationStatus: ReconciliationStatus!
    rawLog: String
}

enum ReconciliationStatus {
    UNMATCHED
    MATCHED
    AMBIGUOUS
    MANUALLY_OVERRIDDEN
    REORGED
}

type ReceiptAsset {
    symbol: String!
    contractAddress: EthereumAddress
}

# reconciliation

input ReceiptAssetInput {
    symbol: String!
    contractAddress: EthereumAddress
}

input RecordReceiptInput {
    chainId: Int!
    txHash: String!
    blockNumber: Int!
    blockTimestamp: DateTime!
    fromAddress: EthereumAddress!
    toAddress: EthereumAddress!
    asset: ReceiptAssetInput!
    amount: Amount_Tokens!
    ethEquivalentAmount: Amount_Tokens!
    ethPriceUsdAtReceipt: Float!
    rawLog: String
}

input AttachPledgeInput {
    pledgeId: PHID!
}

input MarkAmbiguousInput {
    _: Boolean
}

input OverrideMatchInput {
    pledgeId: PHID!
}

input ClearMatchInput {
    _: Boolean
}

input MarkReorgedInput {
    _: Boolean
}