type ContributorProfileState {
    legalName: String
    displayName: String!
    kind: ContributorKind!
    websiteUrl: URL
    twitterHandle: String
    farcasterHandle: String
    walletAddresses: [ContributorWallet!]!
    governanceEndpoints: [GovernanceEndpoint!]!
    trustLevel: TrustLevel!
}

enum ContributorKind {
    DAO
    FOUNDATION
    COMPANY
    INDIVIDUAL
}

enum TrustLevel {
    VERIFIED
    ANNOUNCED
    ANONYMOUS
}

enum GovernancePlatform {
    SNAPSHOT
    TALLY
    FORUM
    AGORA
    OTHER
}

type ContributorWallet {
    id: OID!
    chainId: Int!
    address: EthereumAddress!
    label: String
}

type GovernanceEndpoint {
    id: OID!
    platform: GovernancePlatform!
    url: URL!
}

# profile

input SetProfileDetailsInput {
    legalName: String
    displayName: String
    kind: ContributorKind
    websiteUrl: URL
    twitterHandle: String
    farcasterHandle: String
}

input AddWalletInput {
    id: OID!
    chainId: Int!
    address: EthereumAddress!
    label: String
}

input RemoveWalletInput {
    id: OID!
}

input AddGovernanceEndpointInput {
    id: OID!
    platform: GovernancePlatform!
    url: URL!
}

input RemoveGovernanceEndpointInput {
    id: OID!
}

input SetTrustLevelInput {
    trustLevel: TrustLevel!
}