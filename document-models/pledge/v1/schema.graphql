scalar Unknown
scalar DateTime
scalar Address
scalar AttachmentRef
scalar Amount_Tokens
scalar EthereumAddress
scalar EmailAddress
scalar Amount_Percentage
scalar Date
scalar URL
scalar Amount_Money
scalar OLabel
scalar Currency
scalar PHID
scalar OID
scalar Amount_Fiat
scalar Amount_Currency
scalar Amount_Crypto
scalar Amount
scalar Upload

type PledgeState {
    contributorProfileId: PHID
    pledgedAmount: Amount_Tokens
    asset: PledgeAsset
    status: PledgeStatus!
    governance: PledgeGovernance
    receivedAmount: Amount_Tokens
    receivedAt: DateTime
    receiptIds: [PHID!]!
    publicNotes: String
    internalNotes: String
}

enum PledgeStatus {
    PROPOSED
    GOVERNANCE_PENDING
    CONFIRMED
    RECEIVED
    CANCELLED
    FAILED
}

enum GovernancePlatform {
    SNAPSHOT
    TALLY
    FORUM
    AGORA
    OTHER
}

type PledgeAsset {
    symbol: String!
    address: EthereumAddress
    chainId: Int!
}

type PledgeGovernance {
    platform: GovernancePlatform!
    proposalUrl: URL!
    voteEndDate: DateTime
    quorumStatus: String
}

# lifecycle

input PledgeAssetInput {
    symbol: String!
    address: EthereumAddress
    chainId: Int!
}

input ProposePledgeInput {
    contributorProfileId: PHID!
    pledgedAmount: Amount_Tokens!
    asset: PledgeAssetInput!
    publicNotes: String
    internalNotes: String
}

input AttachGovernanceInput {
    platform: GovernancePlatform!
    proposalUrl: URL!
    voteEndDate: DateTime
    quorumStatus: String
}

input MarkGovernancePendingInput {
    _: Boolean
}

input MarkConfirmedInput {
    _: Boolean
}

input MarkReceivedInput {
    receiptId: PHID!
    receivedAt: DateTime!
    amount: Amount_Tokens!
}

input CancelPledgeInput {
    reason: String
}

input FailPledgeInput {
    reason: String
}

input EditNotesInput {
    publicNotes: String
    internalNotes: String
}