type DistributionPlanState {
    status: DistributionStatus!
    methodology: String
    totalAvailable: Amount_Tokens
    recipients: [DistributionRecipient!]!
    approvalRefs: [ApprovalRef!]!
}

enum DistributionStatus {
    DRAFT
    APPROVED
    EXECUTING
    COMPLETED
    CANCELLED
}

enum RecipientStatus {
    PLANNED
    SENT
    FAILED
    REFUNDED
}

type DistributionRecipient {
    id: OID!
    address: EthereumAddress!
    chainId: Int!
    allocatedAmount: Amount_Tokens!
    rationale: String
    status: RecipientStatus!
    txHash: String
}

type ApprovalRef {
    id: OID!
    url: URL!
    label: String!
}

# planning

input SetMethodologyInput {
    methodology: String
    totalAvailable: Amount_Tokens
}

input AddRecipientInput {
    id: OID!
    address: EthereumAddress!
    chainId: Int!
    allocatedAmount: Amount_Tokens!
    rationale: String
}

input UpdateRecipientInput {
    id: OID!
    allocatedAmount: Amount_Tokens
    rationale: String
}

input RemoveRecipientInput {
    id: OID!
}

input ApprovePlanInput {
    _: Boolean
}

input MarkRecipientSentInput {
    id: OID!
    txHash: String!
}

input MarkRecipientFailedInput {
    id: OID!
}

input MarkRecipientRefundedInput {
    id: OID!
}

input CompleteDistributionInput {
    _: Boolean
}

input CancelPlanInput {
    _: Boolean
}

input AddApprovalRefInput {
    id: OID!
    url: URL!
    label: String!
}